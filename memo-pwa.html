<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="メモ帳">
<title>メモ帳</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #faf8f3;
    --surface: #ffffff;
    --border: #e8e2d9;
    --text: #2c2417;
    --text-soft: #9c8e7e;
    --accent: #c8703a;
    --shadow: rgba(44, 36, 23, 0.08);
  }

  body {
    font-family: 'Noto Sans JP', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: -webkit-fill-available;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  header h1 { font-size: 20px; font-weight: 500; }
  header h1 span { color: var(--accent); }

  .new-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 8px 18px;
    font-size: 14px;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.15s;
  }
  .new-btn:active { opacity: 0.75; }

  #list-view { display: block; }
  #edit-view  { display: none; }

  .memo-list { padding: 16px; display: flex; flex-direction: column; gap: 10px; }

  .empty-state { text-align: center; padding: 80px 20px; color: var(--text-soft); }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-size: 15px; line-height: 1.8; }

  .memo-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    position: relative;
  }
  .memo-card:active { box-shadow: 0 2px 12px var(--shadow); }

  .memo-card-title {
    font-size: 15px; font-weight: 500; margin-bottom: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 32px;
  }
  .memo-card-preview {
    font-size: 13px; color: var(--text-soft); line-height: 1.5;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .memo-card-date { font-size: 11px; color: var(--text-soft); margin-top: 8px; }

  .delete-btn {
    position: absolute; top: 12px; right: 12px;
    background: none; border: none; color: var(--text-soft);
    font-size: 18px; cursor: pointer; padding: 4px;
    -webkit-tap-highlight-color: transparent;
    border-radius: 50%; width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
  }
  .delete-btn:active { background: #fee; color: #c0392b; }

  .edit-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; gap: 12px;
  }

  .back-btn {
    background: none; border: none; color: var(--accent);
    font-size: 15px; font-family: inherit; padding: 6px 4px;
    cursor: pointer; -webkit-tap-highlight-color: transparent; flex-shrink: 0;
  }
  .back-btn:active { opacity: 0.6; }

  .save-btn {
    background: none; border: none; color: var(--accent);
    font-size: 15px; font-family: inherit; font-weight: 500;
    padding: 6px 4px; cursor: pointer; margin-left: auto;
    -webkit-tap-highlight-color: transparent; flex-shrink: 0;
  }
  .save-btn:active { opacity: 0.6; }

  .edit-title-input {
    flex: 1; border: none; outline: none;
    font-size: 16px; font-family: inherit; font-weight: 500;
    color: var(--text); background: transparent;
    text-align: center; min-width: 0;
  }

  .edit-body { padding: 16px; height: calc(100vh - 60px); }

  .edit-textarea {
    width: 100%; height: 100%; border: none; outline: none;
    font-size: 16px; font-family: inherit; line-height: 1.8;
    color: var(--text); background: transparent; resize: none;
    -webkit-appearance: none;
  }

  .saved-toast {
    position: fixed; bottom: 40px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text); color: white;
    padding: 10px 20px; border-radius: 50px; font-size: 13px;
    opacity: 0; transition: opacity 0.25s, transform 0.25s;
    pointer-events: none; z-index: 999; white-space: nowrap;
  }
  .saved-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ホーム画面追加の案内バナー */
  #install-banner {
    background: var(--accent-light, #f5ede6);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    font-size: 12px;
    color: var(--accent);
    text-align: center;
    display: none;
  }
</style>
</head>
<body>

<div id="list-view">
  <div id="install-banner">
    📲 ホーム画面に追加すると、オフラインでも使えます（Safari → 共有 → ホーム画面に追加）
  </div>
  <header>
    <h1>メモ<span>帳</span></h1>
    <button class="new-btn" onclick="newMemo()">＋ 新規</button>
  </header>
  <div class="memo-list" id="memo-list"></div>
</div>

<div id="edit-view">
  <div class="edit-header">
    <button class="back-btn" onclick="goBack()">‹ 一覧</button>
    <input class="edit-title-input" id="edit-title" type="text" placeholder="タイトル">
    <button class="save-btn" onclick="saveMemo()">保存</button>
  </div>
  <div class="edit-body">
    <textarea class="edit-textarea" id="edit-body" placeholder="ここにメモを書いてください…"></textarea>
  </div>
</div>

<div class="saved-toast" id="toast">保存しました</div>

<script>
  // ===== Service Worker をインラインで登録 =====
  if ('serviceWorker' in navigator) {
    const swCode = `
      const CACHE = 'memo-v1';
      self.addEventListener('install', e => {
        e.waitUntil(
          caches.open(CACHE).then(c => c.addAll(['./', './index.html']))
            .catch(() => {})
        );
        self.skipWaiting();
      });
      self.addEventListener('activate', e => {
        self.clients.claim();
      });
      self.addEventListener('fetch', e => {
        e.respondWith(
          caches.match(e.request).then(r => r || fetch(e.request).catch(() => r))
        );
      });
    `;
    const blob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl).catch(() => {});
  }

  // PWAでない場合はバナーを表示
  if (!window.navigator.standalone) {
    document.getElementById('install-banner').style.display = 'block';
  }

  // ===== データ管理 =====
  const STORAGE_KEY = 'iphone_memos_v1';
  let memos = [];
  let currentId = null;

  function loadMemos() {
    try { memos = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch(e) { memos = []; }
  }

  function saveMemos() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(memos));
  }

  function genId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2);
  }

  function formatDate(ts) {
    const d = new Date(ts);
    const now = new Date();
    if (d.toDateString() === now.toDateString()) {
      return d.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
    }
    return d.toLocaleDateString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ===== 一覧表示 =====
  function renderList() {
    const el = document.getElementById('memo-list');
    if (memos.length === 0) {
      el.innerHTML = `<div class="empty-state"><div class="icon">📝</div><p>まだメモがありません<br>「＋ 新規」から作成しましょう</p></div>`;
      return;
    }
    const sorted = [...memos].sort((a, b) => b.updatedAt - a.updatedAt);
    el.innerHTML = sorted.map(m => `
      <div class="memo-card" onclick="openMemo('${m.id}')">
        <div class="memo-card-title">${esc(m.title || '（タイトルなし）')}</div>
        <div class="memo-card-preview">${esc((m.body || '').replace(/\n/g,' ').trim() || '（本文なし）')}</div>
        <div class="memo-card-date">${formatDate(m.updatedAt)}</div>
        <button class="delete-btn" onclick="deleteMemo(event,'${m.id}')">×</button>
      </div>`).join('');
  }

  // ===== 操作 =====
  function newMemo() {
    currentId = genId();
    document.getElementById('edit-title').value = '';
    document.getElementById('edit-body').value = '';
    showEditView();
    setTimeout(() => document.getElementById('edit-body').focus(), 150);
  }

  function openMemo(id) {
    const m = memos.find(x => x.id === id);
    if (!m) return;
    currentId = id;
    document.getElementById('edit-title').value = m.title || '';
    document.getElementById('edit-body').value = m.body || '';
    showEditView();
  }

  function saveMemo() {
    const title = document.getElementById('edit-title').value.trim();
    const body  = document.getElementById('edit-body').value;
    const existing = memos.find(x => x.id === currentId);
    if (existing) {
      existing.title = title; existing.body = body; existing.updatedAt = Date.now();
    } else {
      memos.push({ id: currentId, title, body, createdAt: Date.now(), updatedAt: Date.now() });
    }
    saveMemos();
    showToast('保存しました');
  }

  function deleteMemo(e, id) {
    e.stopPropagation();
    if (!confirm('このメモを削除しますか？')) return;
    memos = memos.filter(x => x.id !== id);
    saveMemos();
    renderList();
  }

  function goBack() {
    const title = document.getElementById('edit-title').value.trim();
    const body  = document.getElementById('edit-body').value;
    if (title || body) {
      const existing = memos.find(x => x.id === currentId);
      if (existing) {
        existing.title = title; existing.body = body; existing.updatedAt = Date.now();
      } else {
        memos.push({ id: currentId, title, body, createdAt: Date.now(), updatedAt: Date.now() });
      }
      saveMemos();
    }
    showListView();
  }

  function showEditView() {
    document.getElementById('list-view').style.display = 'none';
    document.getElementById('edit-view').style.display = 'block';
  }

  function showListView() {
    document.getElementById('edit-view').style.display = 'none';
    document.getElementById('list-view').style.display = 'block';
    renderList();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  }

  // ===== 初期化 =====
  loadMemos();
  renderList();
</script>
</body>
</html>
