<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>メモ帳</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #faf8f3;
    --surface: #ffffff;
    --border: #e8e2d9;
    --text: #2c2417;
    --text-soft: #9c8e7e;
    --accent: #c8703a;
    --accent-light: #f5ede6;
    --shadow: rgba(44, 36, 23, 0.08);
  }

  body {
    font-family: 'Noto Sans JP', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: -webkit-fill-available;
  }

  /* ===== HEADER ===== */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  header h1 {
    font-size: 20px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--text);
  }

  header h1 span {
    color: var(--accent);
  }

  .new-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 8px 18px;
    font-size: 14px;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.02em;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.15s;
  }
  .new-btn:active { opacity: 0.75; }

  /* ===== MAIN VIEW ===== */
  #list-view { display: block; }
  #edit-view  { display: none; }

  /* ===== MEMO LIST ===== */
  .memo-list {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-soft);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-size: 15px; }

  .memo-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    transition: box-shadow 0.15s;
  }
  .memo-card:active { box-shadow: 0 2px 12px var(--shadow); }

  .memo-card-title {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding-right: 32px;
  }

  .memo-card-preview {
    font-size: 13px;
    color: var(--text-soft);
    line-height: 1.5;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .memo-card-date {
    font-size: 11px;
    color: var(--text-soft);
    margin-top: 8px;
  }

  .delete-btn {
    position: absolute;
    top: 12px;
    right: 12px;
    background: none;
    border: none;
    color: var(--text-soft);
    font-size: 18px;
    cursor: pointer;
    padding: 4px;
    line-height: 1;
    -webkit-tap-highlight-color: transparent;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, color 0.15s;
  }
  .delete-btn:active { background: #fee; color: #c0392b; }

  /* ===== EDIT VIEW ===== */
  .edit-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .back-btn {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 15px;
    font-family: inherit;
    padding: 6px 4px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }
  .back-btn:active { opacity: 0.6; }

  .save-btn {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 15px;
    font-family: inherit;
    font-weight: 500;
    padding: 6px 4px;
    cursor: pointer;
    margin-left: auto;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }
  .save-btn:active { opacity: 0.6; }

  .edit-title-input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 16px;
    font-family: inherit;
    font-weight: 500;
    color: var(--text);
    background: transparent;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }

  .edit-body {
    padding: 16px;
    height: calc(100vh - 60px);
    height: calc(-webkit-fill-available - 60px);
  }

  .edit-textarea {
    width: 100%;
    height: 100%;
    border: none;
    outline: none;
    font-size: 16px;
    font-family: inherit;
    line-height: 1.8;
    color: var(--text);
    background: transparent;
    resize: none;
    -webkit-appearance: none;
  }

  .saved-toast {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: white;
    padding: 10px 20px;
    border-radius: 50px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }
  .saved-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<!-- ===== LIST VIEW ===== -->
<div id="list-view">
  <header>
    <h1>メモ<span>帳</span></h1>
    <button class="new-btn" onclick="newMemo()">＋ 新規</button>
  </header>
  <div class="memo-list" id="memo-list"></div>
</div>

<!-- ===== EDIT VIEW ===== -->
<div id="edit-view">
  <div class="edit-header">
    <button class="back-btn" onclick="goBack()">‹ 一覧</button>
    <input class="edit-title-input" id="edit-title" type="text" placeholder="タイトル">
    <button class="save-btn" onclick="saveMemo()">保存</button>
  </div>
  <div class="edit-body">
    <textarea class="edit-textarea" id="edit-body" placeholder="ここにメモを書いてください…"></textarea>
  </div>
</div>

<div class="saved-toast" id="toast">保存しました</div>

<script>
  // ===== DATA =====
  const STORAGE_KEY = 'iphone_memos_v1';
  let memos = [];
  let currentId = null;

  function loadMemos() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      memos = raw ? JSON.parse(raw) : [];
    } catch(e) { memos = []; }
  }

  function saveMemos() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(memos));
  }

  function genId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2);
  }

  function formatDate(ts) {
    const d = new Date(ts);
    const now = new Date();
    const isToday = d.toDateString() === now.toDateString();
    if (isToday) {
      return d.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
    }
    return d.toLocaleDateString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  // ===== RENDER LIST =====
  function renderList() {
    const el = document.getElementById('memo-list');
    if (memos.length === 0) {
      el.innerHTML = `
        <div class="empty-state">
          <div class="icon">📝</div>
          <p>まだメモがありません<br>「＋ 新規」から作成しましょう</p>
        </div>`;
      return;
    }
    // 新しい順
    const sorted = [...memos].sort((a, b) => b.updatedAt - a.updatedAt);
    el.innerHTML = sorted.map(m => {
      const title = m.title || '（タイトルなし）';
      const preview = m.body.replace(/\n/g, ' ').trim() || '（本文なし）';
      return `
        <div class="memo-card" onclick="openMemo('${m.id}')">
          <div class="memo-card-title">${esc(title)}</div>
          <div class="memo-card-preview">${esc(preview)}</div>
          <div class="memo-card-date">${formatDate(m.updatedAt)}</div>
          <button class="delete-btn" onclick="deleteMemo(event,'${m.id}')">×</button>
        </div>`;
    }).join('');
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ===== ACTIONS =====
  function newMemo() {
    currentId = genId();
    document.getElementById('edit-title').value = '';
    document.getElementById('edit-body').value = '';
    showEditView();
    setTimeout(() => document.getElementById('edit-body').focus(), 100);
  }

  function openMemo(id) {
    const m = memos.find(x => x.id === id);
    if (!m) return;
    currentId = id;
    document.getElementById('edit-title').value = m.title;
    document.getElementById('edit-body').value = m.body;
    showEditView();
  }

  function saveMemo() {
    const title = document.getElementById('edit-title').value.trim();
    const body  = document.getElementById('edit-body').value;
    const existing = memos.find(x => x.id === currentId);
    if (existing) {
      existing.title = title;
      existing.body  = body;
      existing.updatedAt = Date.now();
    } else {
      memos.push({ id: currentId, title, body, createdAt: Date.now(), updatedAt: Date.now() });
    }
    saveMemos();
    showToast('保存しました');
  }

  function deleteMemo(e, id) {
    e.stopPropagation();
    if (!confirm('このメモを削除しますか？')) return;
    memos = memos.filter(x => x.id !== id);
    saveMemos();
    renderList();
  }

  function goBack() {
    // 自動保存
    const title = document.getElementById('edit-title').value.trim();
    const body  = document.getElementById('edit-body').value;
    if (title || body) {
      const existing = memos.find(x => x.id === currentId);
      if (existing) {
        existing.title = title;
        existing.body  = body;
        existing.updatedAt = Date.now();
      } else {
        memos.push({ id: currentId, title, body, createdAt: Date.now(), updatedAt: Date.now() });
      }
      saveMemos();
    }
    showListView();
  }

  // ===== VIEW SWITCHING =====
  function showEditView() {
    document.getElementById('list-view').style.display = 'none';
    document.getElementById('edit-view').style.display = 'block';
  }

  function showListView() {
    document.getElementById('edit-view').style.display = 'none';
    document.getElementById('list-view').style.display = 'block';
    renderList();
  }

  // ===== TOAST =====
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  }

  // ===== INIT =====
  loadMemos();
  renderList();
</script>
</body>
</html>
