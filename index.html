<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メモ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0e0e10;
    --surface: #17171a;
    --surface2: #1e1e23;
    --border: #2a2a32;
    --border-focus: #4a4a5a;
    --text: #e8e8ec;
    --text-muted: #6b6b7e;
    --accent: #7c6af7;
    --accent-hover: #9585ff;
    --danger: #e05555;
    --success: #4caf7d;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-weight: 300; }

  /* ══ ロビー ══ */
  #lobby {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    gap: 28px;
  }

  #lobby-counter {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 7px;
  }
  #lobby-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    flex-shrink: 0;
    transition: background 0.3s, box-shadow 0.3s;
  }

  #lobby-form {
    display: flex;
    gap: 8px;
    width: 100%;
    max-width: 360px;
  }

  #room-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    font-weight: 300;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.2s;
    min-width: 0;
  }
  #room-input:focus { border-color: var(--border-focus); }
  #room-input::placeholder { color: var(--text-muted); }

  #room-enter {
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #fff;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 400;
    padding: 11px 20px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, transform 0.1s;
    flex-shrink: 0;
  }
  #room-enter:hover { background: var(--accent-hover); }
  #room-enter:active { transform: scale(0.97); }

  /* ══ メモ画面 ══ */
  #app {
    display: none;
    flex-direction: column;
    min-height: 100vh;
    padding: 16px;
    gap: 12px;
  }
  #app.visible { display: flex; }

  #statusbar {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }
  #dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); flex-shrink: 0; transition: background 0.3s; }
  #dot.online  { background: var(--success); box-shadow: 0 0 6px var(--success); }
  #dot.offline { background: var(--danger); }

  #back-btn {
    margin-left: auto;
    background: none;
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 3px 10px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  #back-btn:hover { border-color: var(--border-focus); color: var(--text); }

  #memo {
    flex: 1;
    min-height: 260px;
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    font-weight: 300;
    line-height: 1.7;
    padding: 14px 16px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }
  #memo:focus { border-color: var(--border-focus); }
  #memo::placeholder { color: var(--text-muted); }

  #image-area { display: flex; flex-wrap: wrap; gap: 10px; }

  .img-thumb { position: relative; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .img-thumb img { display: block; max-width: 160px; max-height: 160px; object-fit: cover; cursor: pointer; }
  .img-thumb .del-img { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.65); border: none; color: #fff; font-size: 13px; width: 22px; height: 22px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
  .img-thumb .del-img:hover { background: var(--danger); }
  .img-thumb .save-img { position: absolute; bottom: 4px; right: 4px; background: rgba(0,0,0,0.65); border: none; color: #fff; font-size: 11px; padding: 2px 7px; border-radius: 20px; cursor: pointer; transition: background 0.2s; }
  .img-thumb .save-img:hover { background: var(--accent); }

  #add-img-btn { width: 80px; height: 80px; border: 1.5px dashed var(--border); border-radius: 8px; background: none; color: var(--text-muted); font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color 0.2s, color 0.2s; flex-shrink: 0; }
  #add-img-btn:hover { border-color: var(--accent); color: var(--accent); }
  #file-input { display: none; }

  .btn-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .btn { flex: 1; min-width: 80px; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface2); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 400; cursor: pointer; transition: background 0.15s, border-color 0.15s, transform 0.1s; white-space: nowrap; }
  .btn:active { transform: scale(0.97); }
  .btn:hover { background: var(--surface); border-color: var(--border-focus); }
  .btn.danger { color: var(--danger); border-color: #3a2222; }
  .btn.danger:hover { background: #2a1515; border-color: var(--danger); }
  .btn.accent { color: var(--accent); border-color: #2a2550; }
  .btn.accent:hover { background: #1e1c38; border-color: var(--accent); }

  #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  #modal.open { display: flex; }
  #modal img { max-width: 100%; max-height: 90vh; border-radius: 8px; }
  #modal-close { position: fixed; top: 14px; right: 18px; background: none; border: none; color: #fff; font-size: 28px; cursor: pointer; line-height: 1; }

  #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(60px); background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-size: 13px; padding: 9px 18px; border-radius: 20px; opacity: 0; transition: opacity 0.3s, transform 0.3s; pointer-events: none; white-space: nowrap; z-index: 200; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ══ ロビー ══ -->
<div id="lobby">
  <div id="lobby-counter">
    <span id="lobby-dot"></span>
    <span id="lobby-count-text">接続中...</span>
  </div>
  <div id="lobby-form">
    <input type="text" id="room-input" placeholder="ルーム名" autocomplete="off" spellcheck="false">
    <button id="room-enter">決定</button>
  </div>
</div>

<!-- ══ メモ画面 ══ -->
<div id="app">
  <div id="statusbar">
    <span id="dot"></span>
    <span id="status-text">接続中...</span>
    <button id="back-btn">← 戻る</button>
  </div>
  <textarea id="memo" placeholder="ここにメモを入力..."></textarea>
  <div id="image-area">
    <button id="add-img-btn" title="画像を追加">＋</button>
    <input type="file" id="file-input" accept="image/jpeg,image/jpg,image/png,image/gif,image/webp" multiple>
  </div>
  <div class="btn-row">
    <button class="btn" id="btn-copy">全コピー</button>
    <button class="btn danger" id="btn-clear">全削除</button>
    <button class="btn accent" id="btn-save-txt">TXTで保存</button>
    <button class="btn accent" id="btn-save-imgs">画像を保存</button>
  </div>
</div>

<!-- モーダル -->
<div id="modal">
  <button id="modal-close">✕</button>
  <img id="modal-img" src="" alt="">
</div>
<div id="toast"></div>

<script type="module">
import {
  initializeApp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getDatabase, ref, onValue, set, remove, onDisconnect
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBis1DFc-VwRYsfj3ypUsqTX8_j9O_pJ-U",
  authDomain: "memo-ada98.firebaseapp.com",
  databaseURL: "https://memo-ada98-default-rtdb.firebaseio.com/",
  projectId: "memo-ada98",
  storageBucket: "memo-ada98.firebasestorage.app",
  messagingSenderId: "169923965635",
  appId: "1:169923965635:web:816262e53137f710092876"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ─── SHA-256（ルーム名を隠す）────────────────────────────────
async function sha256(str) {
  const buf = await crypto.subtle.digest(
    "SHA-256", new TextEncoder().encode(str)
  );
  return Array.from(new Uint8Array(buf))
    .map(b => b.toString(16).padStart(2, "0")).join("");
}

// ─── 全体接続人数（ロビー用）─────────────────────────────────
const globalPresRef = ref(db, "global_presence");
onValue(globalPresRef, (snap) => {
  const n = snap.val() ? Object.keys(snap.val()).length : 0;
  const dot  = document.getElementById("lobby-dot");
  const text = document.getElementById("lobby-count-text");
  text.textContent = n > 0 ? `${n}人が接続中` : "誰も接続していません";
  dot.style.background  = n > 0 ? "var(--success)" : "var(--text-muted)";
  dot.style.boxShadow   = n > 0 ? "0 0 6px var(--success)" : "none";
});

// ─── ルーム管理 ──────────────────────────────────────────────
let currentRoomHash = null;
let myPresId = null;
let roomUnsubs = [];

const roomInput = document.getElementById("room-input");

async function enterRoom() {
  const name = roomInput.value.trim();
  if (!name) return;
  const hash = await sha256(name);
  currentRoomHash = hash;
  myPresId = Date.now().toString(36) + Math.random().toString(36).slice(2);
  document.getElementById("lobby").style.display = "none";
  document.getElementById("app").classList.add("visible");
  initRoom(hash);
}

document.getElementById("room-enter").addEventListener("click", enterRoom);
roomInput.addEventListener("keydown", e => { if (e.key === "Enter") enterRoom(); });

document.getElementById("back-btn").addEventListener("click", async () => {
  await leaveRoom();
  document.getElementById("app").classList.remove("visible");
  document.getElementById("lobby").style.display = "flex";
  roomInput.value = "";
  document.getElementById("memo").value = "";
  document.getElementById("image-area").querySelectorAll(".img-thumb").forEach(e => e.remove());
});

async function leaveRoom() {
  if (!currentRoomHash || !myPresId) return;
  roomUnsubs.forEach(u => u());
  roomUnsubs = [];
  await remove(ref(db, `rooms/${currentRoomHash}/presence/${myPresId}`));
  await remove(ref(db, `global_presence/${myPresId}`));
  currentRoomHash = null;
  myPresId = null;
}

// ─── ルーム初期化 ────────────────────────────────────────────
function initRoom(hash) {
  const memoRef    = ref(db, `rooms/${hash}/memo`);
  const imagesRef  = ref(db, `rooms/${hash}/images`);
  const presRef    = ref(db, `rooms/${hash}/presence`);
  const myPresRef  = ref(db, `rooms/${hash}/presence/${myPresId}`);
  const myGlobRef  = ref(db, `global_presence/${myPresId}`);
  const connRef    = ref(db, ".info/connected");

  // presence + 切断時削除
  const u0 = onValue(connRef, async (snap) => {
    const dot  = document.getElementById("dot");
    const stat = document.getElementById("status-text");
    if (snap.val() === true) {
      dot.className = "online";
      await set(myPresRef, true);
      await set(myGlobRef, true);
      onDisconnect(myPresRef).remove();
      onDisconnect(myGlobRef).remove();
    } else {
      dot.className = "offline";
      stat.textContent = "オフライン";
    }
  });
  roomUnsubs.push(u0);

  // ルーム内人数 → 0 でデータ消去
  const u1 = onValue(presRef, (snap) => {
    const count = snap.val() ? Object.keys(snap.val()).length : 0;
    document.getElementById("status-text").textContent = `同期中 (${count}人)`;
    if (count === 0) {
      set(memoRef, null);
      set(imagesRef, null);
    }
  });
  roomUnsubs.push(u1);

  // テキスト同期
  const memoEl = document.getElementById("memo");
  let remoteUpdate = false;

  const u2 = onValue(memoRef, (snap) => {
    remoteUpdate = true;
    memoEl.value = snap.val() || "";
    remoteUpdate = false;
  });
  roomUnsubs.push(u2);

  function onInput() {
    if (!remoteUpdate) set(memoRef, memoEl.value || null);
  }
  memoEl.addEventListener("input", onInput);
  roomUnsubs.push(() => memoEl.removeEventListener("input", onInput));

  // 画像同期
  let localImages = {};
  const u3 = onValue(imagesRef, (snap) => {
    localImages = snap.val() || {};
    renderImages(hash, localImages);
  });
  roomUnsubs.push(u3);

  // 画像追加
  const addBtn   = document.getElementById("add-img-btn");
  const fileInput = document.getElementById("file-input");

  function onAddClick() { fileInput.click(); }
  async function onFileChange(e) {
    for (const file of Array.from(e.target.files)) {
      const data = await toBase64(file);
      const id   = Date.now().toString(36) + Math.random().toString(36).slice(2);
      await set(ref(db, `rooms/${hash}/images/${id}`), { data, name: file.name });
    }
    e.target.value = "";
  }
  addBtn.addEventListener("click", onAddClick);
  fileInput.addEventListener("change", onFileChange);
  roomUnsubs.push(() => {
    addBtn.removeEventListener("click", onAddClick);
    fileInput.removeEventListener("change", onFileChange);
  });

  // ボタン
  async function onCopy()     { await copyText(memoEl.value); }
  async function onClear()    {
    if (!confirm("テキストと画像をすべて削除しますか？")) return;
    await remove(memoRef); await remove(imagesRef);
    toast("削除しました");
  }
  function onSaveTxt()        { saveTxt(memoEl.value); }
  function onSaveImgs()       { saveAllImages(localImages); }

  document.getElementById("btn-copy").addEventListener("click", onCopy);
  document.getElementById("btn-clear").addEventListener("click", onClear);
  document.getElementById("btn-save-txt").addEventListener("click", onSaveTxt);
  document.getElementById("btn-save-imgs").addEventListener("click", onSaveImgs);
  roomUnsubs.push(() => {
    document.getElementById("btn-copy").removeEventListener("click", onCopy);
    document.getElementById("btn-clear").removeEventListener("click", onClear);
    document.getElementById("btn-save-txt").removeEventListener("click", onSaveTxt);
    document.getElementById("btn-save-imgs").removeEventListener("click", onSaveImgs);
  });
}

// ─── 画像描画 ────────────────────────────────────────────────
function renderImages(hash, images) {
  const area   = document.getElementById("image-area");
  const addBtn = document.getElementById("add-img-btn");
  area.querySelectorAll(".img-thumb").forEach(el => el.remove());

  Object.entries(images).forEach(([id, img]) => {
    const wrap = document.createElement("div");
    wrap.className = "img-thumb";

    const image     = document.createElement("img");
    image.src       = img.data;
    image.alt       = img.name || "image";
    image.onclick   = () => openModal(img.data);

    const delBtn    = document.createElement("button");
    delBtn.className   = "del-img";
    delBtn.textContent = "✕";
    delBtn.title       = "削除";
    delBtn.onclick  = (e) => {
      e.stopPropagation();
      remove(ref(db, `rooms/${hash}/images/${id}`));
    };

    const saveBtn   = document.createElement("button");
    saveBtn.className   = "save-img";
    saveBtn.textContent = "保存";
    saveBtn.onclick = (e) => {
      e.stopPropagation();
      downloadImage(img.data, img.name || `image_${id}.jpg`);
    };

    wrap.append(image, delBtn, saveBtn);
    area.insertBefore(wrap, addBtn);
  });
}

// ─── モーダル ────────────────────────────────────────────────
function openModal(src) {
  document.getElementById("modal-img").src = src;
  document.getElementById("modal").classList.add("open");
}
document.getElementById("modal-close").onclick = () =>
  document.getElementById("modal").classList.remove("open");
document.getElementById("modal").onclick = (e) => {
  if (e.target === document.getElementById("modal"))
    document.getElementById("modal").classList.remove("open");
};

// ─── ユーティリティ ──────────────────────────────────────────
async function copyText(text) {
  try { await navigator.clipboard.writeText(text); }
  catch { document.getElementById("memo").select(); document.execCommand("copy"); }
  toast("コピーしました");
}

function saveTxt(text) {
  if (!text.trim()) { toast("テキストがありません"); return; }
  const a = document.createElement("a");
  a.href     = URL.createObjectURL(new Blob([text], { type: "text/plain;charset=utf-8" }));
  a.download = `memo_${dateStr()}.txt`;
  a.click();
  toast("TXTを保存しました");
}

async function saveAllImages(images) {
  const entries = Object.entries(images);
  if (!entries.length) { toast("画像がありません"); return; }
  for (const [id, img] of entries) {
    await sleep(120);
    downloadImage(img.data, img.name || `image_${id}.jpg`);
  }
  toast(`${entries.length}枚の画像を保存しました`);
}

function downloadImage(dataUrl, name) {
  const a = document.createElement("a");
  a.href = dataUrl; a.download = name; a.click();
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = () => res(r.result);
    r.onerror = () => rej(new Error("read failed"));
    r.readAsDataURL(file);
  });
}

function dateStr() {
  const d = new Date();
  return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}`;
}
function pad(n) { return String(n).padStart(2,"0"); }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

let toastTimer;
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2200);
}

// ─── ページを閉じる時の presence 削除 ───────────────────────
window.addEventListener("beforeunload", () => {
  if (!currentRoomHash || !myPresId) return;
  const base = "https://memo-ada98-default-rtdb.firebaseio.com";
  navigator.sendBeacon(`${base}/rooms/${currentRoomHash}/presence/${myPresId}.json`, "null");
  navigator.sendBeacon(`${base}/global_presence/${myPresId}.json`, "null");
});
</script>
</body>
</html>
