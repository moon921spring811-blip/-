<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メモ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0e0e10;
    --surface: #17171a;
    --surface2: #1e1e23;
    --border: #2a2a32;
    --border-focus: #4a4a5a;
    --text: #e8e8ec;
    --text-muted: #6b6b7e;
    --accent: #7c6af7;
    --accent-hover: #9585ff;
    --danger: #e05555;
    --danger-hover: #f06666;
    --success: #4caf7d;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    padding: 16px;
    gap: 12px;
  }

  /* ── ステータスバー ── */
  #statusbar {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    height: 20px;
  }

  #dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-muted);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  #dot.online  { background: var(--success); box-shadow: 0 0 6px var(--success); }
  #dot.offline { background: var(--danger); }

  /* ── テキストエリア ── */
  #memo {
    flex: 1;
    min-height: 260px;
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    font-weight: 300;
    line-height: 1.7;
    padding: 14px 16px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }
  #memo:focus { border-color: var(--border-focus); }
  #memo::placeholder { color: var(--text-muted); }

  /* ── 画像エリア ── */
  #image-area {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .img-thumb {
    position: relative;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .img-thumb img {
    display: block;
    max-width: 160px;
    max-height: 160px;
    object-fit: cover;
    cursor: pointer;
  }
  .img-thumb .del-img {
    position: absolute;
    top: 4px; right: 4px;
    background: rgba(0,0,0,0.65);
    border: none;
    color: #fff;
    font-size: 13px;
    width: 22px; height: 22px;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .img-thumb .del-img:hover { background: var(--danger); }
  .img-thumb .save-img {
    position: absolute;
    bottom: 4px; right: 4px;
    background: rgba(0,0,0,0.65);
    border: none;
    color: #fff;
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 20px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .img-thumb .save-img:hover { background: var(--accent); }

  /* 画像追加ボタン */
  #add-img-btn {
    width: 80px; height: 80px;
    border: 1.5px dashed var(--border);
    border-radius: 8px;
    background: none;
    color: var(--text-muted);
    font-size: 28px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s, color 0.2s;
    flex-shrink: 0;
  }
  #add-img-btn:hover { border-color: var(--accent); color: var(--accent); }
  #file-input { display: none; }

  /* ── ボタン行 ── */
  .btn-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .btn {
    flex: 1;
    min-width: 80px;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface2);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 400;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .btn:active { transform: scale(0.97); }
  .btn:hover { background: var(--surface); border-color: var(--border-focus); }

  .btn.danger { color: var(--danger); border-color: #3a2222; }
  .btn.danger:hover { background: #2a1515; border-color: var(--danger); }

  .btn.accent { color: var(--accent); border-color: #2a2550; }
  .btn.accent:hover { background: #1e1c38; border-color: var(--accent); }

  /* ── モーダル（画像拡大） ── */
  #modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  #modal.open { display: flex; }
  #modal img {
    max-width: 100%;
    max-height: 90vh;
    border-radius: 8px;
    box-shadow: var(--shadow);
  }
  #modal-close {
    position: fixed;
    top: 14px; right: 18px;
    background: none;
    border: none;
    color: #fff;
    font-size: 28px;
    cursor: pointer;
    line-height: 1;
  }

  /* ── トースト ── */
  #toast {
    position: fixed;
    bottom: 20px; left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 13px;
    padding: 9px 18px;
    border-radius: 20px;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 200;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<!-- ステータス -->
<div id="statusbar">
  <span id="dot"></span>
  <span id="status-text">接続中...</span>
</div>

<!-- テキスト -->
<textarea id="memo" placeholder="ここにメモを入力..."></textarea>

<!-- 画像エリア -->
<div id="image-area">
  <button id="add-img-btn" title="画像を追加">＋</button>
  <input type="file" id="file-input" accept="image/jpeg,image/jpg,image/png,image/gif,image/webp" multiple>
</div>

<!-- ボタン行 -->
<div class="btn-row">
  <button class="btn" id="btn-copy">全コピー</button>
  <button class="btn danger" id="btn-clear">全削除</button>
  <button class="btn accent" id="btn-save-txt">TXTで保存</button>
  <button class="btn accent" id="btn-save-imgs">画像を保存</button>
</div>

<!-- 画像拡大モーダル -->
<div id="modal">
  <button id="modal-close">✕</button>
  <img id="modal-img" src="" alt="">
</div>

<!-- トースト -->
<div id="toast"></div>

<script type="module">
import { initializeApp }           from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, set, remove, increment, serverTimestamp }
                                    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getDatabase as getDB2, ref as dbRef2, onDisconnect }
                                    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBis1DFc-VwRYsfj3ypUsqTX8_j9O_pJ-U",
  authDomain: "memo-ada98.firebaseapp.com",
  databaseURL: "https://memo-ada98-default-rtdb.firebaseio.com/",
  projectId: "memo-ada98",
  storageBucket: "memo-ada98.firebasestorage.app",
  messagingSenderId: "169923965635",
  appId: "1:169923965635:web:816262e53137f710092876"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ─── refs ────────────────────────────────────────
const memoRef    = ref(db, "memo");
const imagesRef  = ref(db, "images");
const countRef   = ref(db, "connectedCount");
const connRef    = ref(db, ".info/connected");

// ─── 接続カウント管理 ────────────────────────────
// 自分が接続 → +1、切断時 → -1、0以下でデータ全消去
onValue(connRef, async (snap) => {
  const dot  = document.getElementById("dot");
  const stat = document.getElementById("status-text");

  if (snap.val() === true) {
    dot.className = "online";
    stat.textContent = "同期中";

    // カウントを+1
    const { get, runTransaction } = await import(
      "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
    );
    await runTransaction(countRef, (current) => (current || 0) + 1);

    // 切断時: カウント-1、0以下ならデータ削除
    // onDisconnect はサーバー側で実行される安全な処理
    // ただしカウント-1後に0判定＆削除はCloud Functions無しだと難しいため
    // 代替: onDisconnect でカウント-1 + クライアント側で0検知時に削除
    const { onDisconnect: od } = await import(
      "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
    );
    await od(countRef).set(null); // 切断時にカウントをnullに（全員切断でnullになるよう設計）

    // 実際のカウントはリスト方式で管理（より確実）
  } else {
    dot.className = "offline";
    stat.textContent = "オフライン";
  }
});

// ─── presence（接続者数の確実な管理）────────────
// /presence/<ランダムID> を作り、onDisconnect で削除
// presenceの件数が0になったらデータをクリア

const presenceId = Math.random().toString(36).slice(2);
const myPresRef  = ref(db, `presence/${presenceId}`);

(async () => {
  const { onDisconnect: od, set: fbSet, get, onValue: fbOnValue } =
    await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js");

  // 接続確立後に presence をセット＆切断時に削除
  onValue(connRef, async (snap) => {
    if (snap.val() === true) {
      await fbSet(myPresRef, true);
      await od(myPresRef).remove();
    }
  }, { onlyOnce: false });

  // presence の変化を監視 → 0人になったらクリア
  const presenceRootRef = ref(db, "presence");
  fbOnValue(presenceRootRef, (snap) => {
    const val = snap.val();
    const count = val ? Object.keys(val).length : 0;

    const dot  = document.getElementById("dot");
    const stat = document.getElementById("status-text");
    if (snap.val() !== null || document.getElementById("dot").className === "online") {
      stat.textContent = `同期中 (${count}人)`;
    }

    if (count === 0) {
      // 全員切断 → データ初期化
      fbSet(memoRef, null);
      fbSet(imagesRef, null);
    }
  });
})();

// ─── テキスト同期 ────────────────────────────────
const memoEl = document.getElementById("memo");
let remoteUpdate = false;

onValue(memoRef, (snap) => {
  remoteUpdate = true;
  memoEl.value = snap.val() || "";
  remoteUpdate = false;
});

memoEl.addEventListener("input", () => {
  if (!remoteUpdate) set(memoRef, memoEl.value || null);
});

// ─── 画像管理 ────────────────────────────────────
// images は { id: { data: base64, name: string } } の形
let localImages = {}; // id → { data, name }

onValue(imagesRef, (snap) => {
  const val = snap.val() || {};
  localImages = val;
  renderImages();
});

function renderImages() {
  const area = document.getElementById("image-area");
  // 既存サムネを消す（ボタンは残す）
  area.querySelectorAll(".img-thumb").forEach(el => el.remove());

  const addBtn = document.getElementById("add-img-btn");

  Object.entries(localImages).forEach(([id, img]) => {
    const wrap = document.createElement("div");
    wrap.className = "img-thumb";

    const image = document.createElement("img");
    image.src = img.data;
    image.alt = img.name || "image";
    image.onclick = () => openModal(img.data);

    const delBtn = document.createElement("button");
    delBtn.className = "del-img";
    delBtn.textContent = "✕";
    delBtn.title = "削除";
    delBtn.onclick = (e) => {
      e.stopPropagation();
      const { remove: fbRemove } = {};
      import("https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js")
        .then(({ remove }) => remove(ref(db, `images/${id}`)));
    };

    const saveBtn = document.createElement("button");
    saveBtn.className = "save-img";
    saveBtn.textContent = "保存";
    saveBtn.onclick = (e) => {
      e.stopPropagation();
      downloadImage(img.data, img.name || `image_${id}.jpg`);
    };

    wrap.appendChild(image);
    wrap.appendChild(delBtn);
    wrap.appendChild(saveBtn);
    area.insertBefore(wrap, addBtn);
  });
}

// 画像追加
document.getElementById("add-img-btn").onclick = () =>
  document.getElementById("file-input").click();

document.getElementById("file-input").addEventListener("change", async (e) => {
  const files = Array.from(e.target.files);
  for (const file of files) {
    const base64 = await toBase64(file);
    const id = Date.now().toString(36) + Math.random().toString(36).slice(2);
    const { set: fbSet } = await import(
      "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
    );
    await fbSet(ref(db, `images/${id}`), { data: base64, name: file.name });
  }
  e.target.value = "";
});

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = () => res(r.result);
    r.onerror = () => rej(new Error("read failed"));
    r.readAsDataURL(file);
  });
}

// ─── モーダル ────────────────────────────────────
function openModal(src) {
  document.getElementById("modal-img").src = src;
  document.getElementById("modal").classList.add("open");
}
document.getElementById("modal-close").onclick = () =>
  document.getElementById("modal").classList.remove("open");
document.getElementById("modal").addEventListener("click", (e) => {
  if (e.target === document.getElementById("modal"))
    document.getElementById("modal").classList.remove("open");
});

// ─── ボタン操作 ──────────────────────────────────
// 全コピー
document.getElementById("btn-copy").onclick = async () => {
  const text = memoEl.value;
  try {
    await navigator.clipboard.writeText(text);
    toast("コピーしました");
  } catch {
    memoEl.select();
    document.execCommand("copy");
    toast("コピーしました");
  }
};

// 全削除
document.getElementById("btn-clear").onclick = async () => {
  if (!confirm("テキストと画像をすべて削除しますか？")) return;
  const { remove: fbRemove } = await import(
    "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
  );
  await fbRemove(memoRef);
  await fbRemove(imagesRef);
  toast("削除しました");
};

// TXTで保存
document.getElementById("btn-save-txt").onclick = () => {
  const text = memoEl.value;
  if (!text.trim()) { toast("テキストがありません"); return; }
  const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href     = url;
  a.download = `memo_${dateStr()}.txt`;
  a.click();
  URL.revokeObjectURL(url);
  toast("TXTを保存しました");
};

// 画像を保存（全枚）
document.getElementById("btn-save-imgs").onclick = async () => {
  const entries = Object.entries(localImages);
  if (entries.length === 0) { toast("画像がありません"); return; }
  for (const [id, img] of entries) {
    await sleep(100);
    downloadImage(img.data, img.name || `image_${id}.jpg`);
  }
  toast(`${entries.length}枚の画像を保存しました`);
};

// ─── ユーティリティ ──────────────────────────────
function downloadImage(dataUrl, filename) {
  const a = document.createElement("a");
  a.href = dataUrl;
  a.download = filename;
  a.click();
}

function dateStr() {
  const d = new Date();
  return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}`;
}
function pad(n) { return String(n).padStart(2,"0"); }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

let toastTimer;
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2200);
}
</script>
</body>
</html>
